name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  swift:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Set up Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: 6.2
      - name: Build
        run: swift build
      - name: Test
        run: swift run KShowSubCoreTestRunner
